<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Log!t - Stats</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
rel="stylesheet">
<link rel="stylesheet" href="css/main.css?v=9">
<link rel="stylesheet" href="css/components.css?v=9">
<link rel="stylesheet" href="css/stats.css?v=9">
<link rel="stylesheet" href="css/desktop.css?v=9">
<link rel="stylesheet" href="css/animations.css?v=9">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>

<header class="header">
<div class="headerRow">
<button class="headBtn" onclick="if(history.length>1)history.back();else location.href='index.html'">
<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<a href="index.html" class="logo">Log!t</a>
<span class="headerTitle">Stats</span>
<div class="pcHeaderNav">
  <button class="pcNavBtn" onclick="location.href='index.html'">Library</button>
  <button class="pcNavBtn" onclick="location.href='index.html?add=true'">Add Movie</button>
  <button class="pcNavBtn active" onclick="location.href='PS.html'">Stats</button>
</div>
<div style="display:flex;gap:6px;">
<button class="settingsIcon" id="profileBtn" title="Profile" onclick="location.href='profile.html'">
<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
</button>
<button class="settingsIcon" id="backBtn" title="Back" onclick="location.href='index.html'">
<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
</button>
</div>
</div>
</header>


<!-- ========= IMPORT ========= -->
<div class="importModal" id="importModal">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <h3 style="font-size:16px;font-weight:700;">Import Movies</h3>
    <button class="headBtn" id="importModalClose" style="width:34px;height:34px;">&times;</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <label style="flex:1;height:44px;border-radius:10px;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:500;color:#fff;gap:6px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload JSON
      <input type="file" id="fileInput" accept=".json" style="display:none;">
    </label>
  </div>
  <textarea class="importTextarea" id="importText" placeholder="Or paste text here...&#10;&#10;JSON (from Log!t export):&#10;Paste the full exported JSON array — imports directly with all data.&#10;&#10;One movie per line:&#10;tt0133093  4.5  2024-05-15    (IMDB ID)&#10;tmdb:27205  5  2024-01-10      (TMDB ID)&#10;#550                       (TMDB ID with #)&#10;Inception 3.5&#10;Interstellar - 5/5 - 2024-01-10&#10;Fight Club  2023-12-25  4&#10;&#10;Pipe format:&#10;Movie Name | Rating | IMDb/TMDb_ID | Date | RewatchStatus&#10;The Matrix | 5 | tmdb:603 | 2024-05-15 | rewatch&#10;&#10;Ratings default to 3. Dates default to today."></textarea>
  <div class="importFooter">
    <button class="importBtn" id="importStartBtn">Import</button>
  </div>
  <div class="importStatus" id="importStatus"></div>
</div>

<!-- ========= EXPORT ========= -->
<div class="exportModal" id="exportModal">
  <div class="exportSheet">
    <h3>Export Movies</h3>
    <div class="exportBtns">
      <button class="jsonBtn" id="exportJsonBtn">Export as JSON</button>
      <button class="txtBtn" id="exportTxtBtn">Export as Text</button>
      <button class="cancelBtn" id="exportCancelBtn">Cancel</button>
    </div>
  </div>
</div>

<section class="mapWrap">

<div class="hero">

<div class="statBox">

<h2 id="movieCount">
0
</h2>

<p>
Films
</p>

</div>

<div class="statBox" id="runtimeBox" style="cursor:pointer;">

<div id="timeCount">
0h
</div>

<p>
Runtime
</p>

</div>

<div class="statBox">

<h2 id="ratingAvg">
0.0
</h2>

<p>
Average
</p>

</div>


</div>

<div class="peopleGrid peopleGrid3">

<div class="peopleCard">

<div class="sectionTitle">
Top Directors
</div>

<div
class="peopleList"
id="directorList">
</div>

</div>

<div class="peopleCard">

<div class="sectionTitle">
Top Main Actors
</div>

<div
class="peopleList"
id="mainActorList">
</div>

</div>

<div class="peopleCard">

<div class="sectionTitle">
Top Supporting Actors
</div>

<div
class="peopleList"
id="supportActorList">
</div>

</div>

<div class="peopleCard">

<div class="sectionTitle">
Top Productions
</div>

<div
class="peopleList"
id="productionList">
</div>

</div>

</div>

<div class="metaGrid">

<div class="metaCard toggleable">
  <div class="metaHead">
    <div class="metaLeft">
      <div class="metaArrow">&rsaquo;</div>
      <div class="metaTitle">Genres Watched</div>
    </div>
    <div class="metaTotal" id="genreTotal">0</div>
  </div>
  <div class="metaCollapse">
    <div class="metaCollapseInner">
      <div class="metaWrap" id="genreWrap"></div>
    </div>
  </div>
</div>

<div class="metaCard toggleable">
  <div class="metaHead">
    <div class="metaLeft">
      <div class="metaArrow">&rsaquo;</div>
      <div class="metaTitle">Languages</div>
    </div>
    <div class="metaTotal" id="langTotal">0</div>
  </div>
  <div class="metaCollapse">
    <div class="metaCollapseInner">
      <div class="metaWrap" id="langWrap"></div>
    </div>
  </div>
</div>

<div class="metaCard toggleable">
  <div class="metaHead">
    <div class="metaLeft">
      <div class="metaArrow">&rsaquo;</div>
      <div class="metaTitle">Regions</div>
    </div>
    <div class="metaTotal" id="regionTotal">0</div>
  </div>
  <div class="metaCollapse">
    <div class="metaCollapseInner">
      <div class="metaWrap" id="regionWrap"></div>
    </div>
  </div>
</div>

<div class="metaCard toggleable">
  <div class="metaHead">
    <div class="metaLeft">
      <div class="metaArrow">&rsaquo;</div>
      <div class="metaTitle">Most Rewatched</div>
    </div>
    <div class="metaTotal" id="rewatchTotal">0</div>
  </div>
  <div class="metaCollapse">
    <div class="metaCollapseInner">
      <div class="metaWrap" id="rewatchWrap"></div>
    </div>
  </div>
</div>

<div class="metaCard toggleable" id="yearCard">
  <div class="metaHead">
    <div class="metaLeft">
      <div class="metaArrow">&rsaquo;</div>
      <div class="metaTitle">Release Years</div>
    </div>
    <div class="metaTotal" id="yearTotal">0</div>
  </div>
  <div class="metaCollapse">
    <div class="metaCollapseInner">
      <div class="metaWrap" id="yearWrap"></div>
    </div>
  </div>
</div>

<div class="metaCard toggleable">
  <div class="metaHead">
    <div class="metaLeft">
      <div class="metaArrow">&rsaquo;</div>
      <div class="metaTitle">Production Companies</div>
    </div>
    <div class="metaTotal" id="productionTotal">0</div>
  </div>
  <div class="metaCollapse">
    <div class="metaCollapseInner">
      <div class="metaWrap" id="productionWrap"></div>
    </div>
  </div>
</div>

</div>

<div class="actionGrid">
  <button data-action="export" class="actionBtn">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export
  </button>
  <button data-action="import" class="actionBtn">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Import
  </button>
  <button data-action="about" class="actionBtn full">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    About
  </button>
</div>

</section>
<script src="js/constants.js?v=9"></script>
<script src="js/config.js?v=9"></script>
<script src="js/storage.js?v=9"></script>
<script src="js/utils.js?v=9"></script>
<script src="js/movieFactory.js?v=9"></script>
<script src="js/movies.js?v=9"></script>
<script src="js/search.js?v=9"></script>
<script src="js/supabase.js?v=1"></script>
<script src="js/auth.js?v=1"></script>
<script src="js/ui.js?v=9"></script>
<script src="js/import.js?v=9"></script>
<script src="js/export.js?v=10"></script>
<script src="js/statutils.js?v=10"></script>
<script src="js/stats.js?v=10"></script>
<script src="js/app.js?v=9"></script>

</body>
</html>
