<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Profile - Log!t</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css?v=9">
<link rel="stylesheet" href="css/components.css?v=9">
<link rel="stylesheet" href="css/auth.css?v=10">
<link rel="stylesheet" href="css/stats.css?v=9">
<link rel="stylesheet" href="css/desktop.css?v=9">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<header class="header" id="header">
  <div class="headerRow">
    <div style="display:flex;align-items:center;gap:10px;flex:1;">
      <a href="index.html" class="logo">Log!t.</a>
    </div>
    <div class="pcHeaderNav">
      <button class="pcNavBtn" onclick="location.href='index.html'">Library</button>
      <button class="pcNavBtn" onclick="location.href='PS.html'">Stats</button>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="settingsIcon" id="backBtn" title="Back">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
    </div>
  </div>
</header>

<section class="profileContainer" id="profileContainer">

  <!-- Profile Header -->
  <div class="profileCard profileHeader">
    <div style="position:relative;display:inline-block;">
      <div class="profileAvatar" id="profileAvatar">S</div>
      <button id="editAvatarBtn" style="position:absolute;bottom:0;right:0;width:26px;height:26px;border-radius:50%;background:var(--green);border:none;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>
      <input type="file" id="avatarInput" accept="image/*" style="display:none;">
    </div>
    <div class="profileInfo">
      <div style="display:flex;align-items:center;gap:6px;">
        <h2 class="profileName" id="profileName">Loading...</h2>
        <button id="editUsernameBtn" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:2px;" title="Edit username">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
        </button>
      </div>
      <p class="profileEmail" id="profileEmail"></p>
    </div>
  </div>

  <!-- Sync -->
  <div class="profileCard">
    <div class="profileSectionTitle">Sync</div>
    <div class="profileRow">
      <span class="profileLabel">Status</span>
      <div class="syncStatus" id="syncStatusBadge">
        <span class="syncDot"></span>
        <span id="syncStatusText">Synced</span>
      </div>
    </div>
    <div class="profileRow">
      <span class="profileLabel">Last Synced</span>
      <span class="profileValue" id="lastSyncedTime">-</span>
    </div>
    <div class="profileRow">
      <span class="profileLabel">Synced</span>
      <span class="profileValue" id="syncedCount">0</span>
    </div>
    <div class="profileRow">
      <span class="profileLabel">Not Synced</span>
      <span class="profileValue" id="unsyncedCount">0</span>
    </div>
    <div class="profileRow">
      <span class="profileLabel">Auto Sync</span>
      <button class="settingToggle" id="autoSyncToggle"></button>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="profileButton" id="manualSyncBtn" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Push
      </button>
      <button class="profileButton" id="pullCloudBtn" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Pull
      </button>
    </div>
  </div>

  <!-- Storage -->
  <div class="profileCard">
    <div class="profileSectionTitle">Storage</div>
    <div class="profileRow">
      <span class="profileLabel">Local</span>
      <span class="profileValue" id="localStorageUsage">- / 5 MB</span>
    </div>
    <div class="profileRow">
      <span class="profileLabel">Cloud</span>
      <span class="profileValue" id="cloudStorageUsage">- / 500 MB</span>
    </div>
    <div class="profileRow">
      <span class="profileLabel">Local Movies</span>
      <span class="profileValue" id="moviesCount">0</span>
    </div>
    <div class="profileRow">
      <span class="profileLabel">Cloud Movies</span>
      <span class="profileValue" id="cloudMoviesCount">0</span>
    </div>
  </div>

  <!-- Import / Export -->
  <div class="profileCard">
    <div class="profileSectionTitle">Import / Export</div>
    <button class="profileButton" id="exportBtn" style="display:flex;align-items:center;gap:8px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export Movies
    </button>
    <button class="profileButton" id="importBtn" style="display:flex;align-items:center;gap:8px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import Movies
    </button>
  </div>

  <!-- Account -->
  <div class="profileCard">
    <div class="profileSectionTitle">Account</div>
    <button class="profileButton" id="changePasswordBtn" style="display:flex;align-items:center;gap:8px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Change Password
    </button>
    <button class="profileButton" id="signOutBtn" style="display:flex;align-items:center;gap:8px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
    <button class="profileButton danger" id="deleteAccountBtn" style="display:flex;align-items:center;gap:8px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      Delete Account
    </button>
  </div>

  <!-- Clear Data -->
  <div style="padding:16px 0;display:flex;justify-content:center;">
    <button class="profileButton danger" id="clearDataBtn" style="min-width:240px;display:flex;align-items:center;justify-content:center;gap:8px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      Clear All Local Data
    </button>
  </div>

  <!-- Offline Mode -->
  <div class="profileCard offlineSection" id="offlineModeSection" style="display:none;">
    <div class="profileSectionTitle">Offline Mode</div>
    <p class="smallText" style="margin:0;color:var(--muted);">You're currently using Log!t in offline mode.</p>
    <button class="profileButton" id="enableCloudBtn" style="margin-top:12px;">Enable Cloud Sync</button>
  </div>

</section>

<!-- Import Modal -->
<div class="importModal" id="importModal">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <h3 style="font-size:16px;font-weight:700;">Import Movies</h3>
    <button class="headBtn" id="importModalClose" style="width:34px;height:34px;">&times;</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <label style="flex:1;height:44px;border-radius:10px;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:500;color:#fff;gap:6px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload File
      <input type="file" id="fileInput" accept=".json,.txt" style="display:none;">
    </label>
  </div>
  <textarea class="importTextarea" id="importText" placeholder="Paste text or upload a file..."></textarea>
  <div class="importFooter">
    <button class="importBtn" id="importStartBtn">Import</button>
  </div>
  <div class="importStatus" id="importStatus"></div>
</div>

<!-- Export Modal -->
<div class="exportModal" id="exportModal">
  <div class="exportSheet">
    <h3>Export Movies</h3>
    <div class="exportBtns">
      <button class="jsonBtn" id="exportJsonBtn">Export as JSON</button>
      <button class="txtBtn" id="exportTxtBtn">Export as Text</button>
      <button class="cancelBtn" id="exportCancelBtn">Cancel</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/constants.js"></script>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/offline.js"></script>
<script src="js/sync.js"></script>
<script src="js/ui.js"></script>
<script src="js/import.js"></script>
<script src="js/search.js"></script>
<script src="js/movieFactory.js"></script>
<script src="js/movies.js"></script>
<script src="js/export.js"></script>
<script src="js/profile.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    Logit.ProfilePage.init();
  });
</script>
</body>
</html>
