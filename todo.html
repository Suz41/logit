<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Log!t - Todo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css?v=1">
<link rel="stylesheet" href="css/components.css?v=1">
<link rel="stylesheet" href="css/library.css?v=1">
<link rel="stylesheet" href="css/desktop.css?v=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<header class="header" id="header">
  <div class="headerRow">
    <div style="display:flex;align-items:center;gap:10px;flex:1;">
      <a href="index.html" class="logo">Log!t</a>
    </div>
    <div class="pcHeaderNav">
      <button class="pcNavBtn" onclick="location.href='index.html'">Library</button>
      <button class="pcNavBtn active" onclick="location.href='todo.html'">Todo</button>
      <button class="pcNavBtn" onclick="location.href='PS.html'">Stats</button>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="settingsIcon" id="syncBtn" title="Sync Todoist">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
      </button>
      <button class="settingsIcon" id="profileBtn" title="Profile" onclick="location.href='profile.html'">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </div>
</header>

<section class="todoPage">
  <div class="todoHeader">
    <h2>Todoist Movies</h2>
    <p class="todoSub" id="todoCount">0 pending</p>
  </div>
  <div class="todoList" id="todoList"></div>
  <div class="todoEmpty" id="todoEmpty" style="display:none;">
    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/></svg>
    <p>No pending movies</p>
    <p class="todoHint">Sync from Todoist to see movies here</p>
  </div>
</section>

<nav class="bottomNav" id="bottomNav">
  <button class="navItem" id="navLibrary" onclick="location.href='index.html'">
    <svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span class="navLabel">Library</span>
  </button>
  <button class="navAdd" id="navAdd" onclick="location.href='index.html?add=true'">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <button class="navItem on" id="navTodo">
    <svg class="navIcon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    <span class="navLabel">Todo</span>
  </button>
</nav>

<script src="js/config.js?v=1"></script>
<script src="js/constants.js?v=1"></script>
<script src="js/storage.js?v=1"></script>
<script src="js/utils.js?v=1"></script>
<script src="js/supabase.js?v=1"></script>
<script src="js/auth.js?v=1"></script>
<script src="js/search.js?v=1"></script>
<script src="js/movieFactory.js?v=1"></script>
<script src="js/todoist.js?v=1"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    Logit.Supabase.init();
    renderTodoPage();

    document.getElementById('syncBtn').addEventListener('click', async function() {
      if (!Logit.Todoist.isConfigured()) {
        alert('Please set your Todoist API key in About page first.');
        return;
      }
      var btn = this;
      btn.style.opacity = '0.5';
      try {
        await Logit.Todoist.sync();
        renderTodoPage();
      } catch (e) {
        alert('Sync failed: ' + e.message);
      }
      btn.style.opacity = '1';
    });
  });

  function renderTodoPage() {
    var pending = Logit.Todoist.getPending();
    var list = document.getElementById('todoList');
    var empty = document.getElementById('todoEmpty');
    var count = document.getElementById('todoCount');

    count.textContent = pending.length + ' pending';

    if (pending.length === 0) {
      list.style.display = 'none';
      empty.style.display = 'flex';
      return;
    }

    list.style.display = 'flex';
    empty.style.display = 'none';
    list.innerHTML = '';

    var esc = Logit.Utils.esc;

    pending.forEach(function(movie) {
      var card = document.createElement('div');
      card.className = 'pendingCard';

      var posterHtml = movie.tmdb && movie.tmdb.poster
        ? '<img class="pendingPoster" src="https://image.tmdb.org/t/p/w185' + movie.tmdb.poster + '" alt="">'
        : '<div class="pendingPoster no-poster">No poster</div>';

      var title = movie.tmdb ? movie.tmdb.title : movie.name;
      var year = movie.tmdb ? movie.tmdb.year : '';
      var dateStr = movie.date || 'No date';
      var ratingStr = movie.rating ? movie.rating + ' stars' : 'No rating';
      var overview = movie.tmdb && movie.tmdb.overview ? movie.tmdb.overview.slice(0, 100) + '...' : '';

      card.innerHTML = posterHtml
        + '<div class="pendingInfo">'
        + '<div class="pendingTitle">' + esc(title) + (year ? ' (' + esc(year) + ')' : '') + '</div>'
        + '<div class="pendingMeta">' + esc(dateStr) + ' · ' + ratingStr + '</div>'
        + (overview ? '<div class="pendingOverview">' + esc(overview) + '</div>' : '')
        + '<div class="pendingActions">'
        + '<button class="pendingBtn accept" data-id="' + movie.todoistId + '">Accept</button>'
        + '<button class="pendingBtn reject" data-id="' + movie.todoistId + '">Reject</button>'
        + '</div>'
        + '</div>';

      list.append(card);
    });

    list.querySelectorAll('.pendingBtn.accept').forEach(function(btn) {
      btn.addEventListener('click', async function() {
        var todoistId = btn.dataset.id;
        var movie = pending.find(function(p) { return p.todoistId === todoistId; });
        if (!movie || !movie.tmdb) {
          alert('No TMDB match found.');
          return;
        }

        var watchDate = movie.date || new Date().toISOString().slice(0, 10);
        var newMovie = {
          id: Logit.MovieFactory.generateUUID(),
          tmdb_id: String(movie.tmdb.id),
          t: movie.tmdb.title,
          sp: movie.tmdb.poster,
          yr: movie.tmdb.year,
          r: movie.rating || 3,
          d: watchDate,
          w: '1st Watch',
          g: '', c: '', dr: '', rt: '', lg: '', ct: ''
        };

        try {
          await Logit.Storage.saveMovie(newMovie, 'create');
          Logit.Todoist.removePending(todoistId);
          renderTodoPage();
        } catch (e) {
          alert('Failed to save: ' + e.message);
        }
      });
    });

    list.querySelectorAll('.pendingBtn.reject').forEach(function(btn) {
      btn.addEventListener('click', function() {
        Logit.Todoist.removePending(btn.dataset.id);
        renderTodoPage();
      });
    });
  }
</script>
</body>
</html>
