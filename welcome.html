<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Log!t - Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css?v=9">
<link rel="stylesheet" href="css/auth.css?v=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="welcomePage">

<div class="welcomeContainer">
  <div class="welcomeContent">
    <div class="welcomeLogo">
      <h1>Log!t</h1>
      <p class="welcomeTagline">Your movie journal</p>
    </div>

    <div class="welcomeMessage">
      <p>Sign in to sync your movies across devices.</p>
    </div>

    <div class="authForm" style="gap: 12px;">
      <input type="email" placeholder="Email" id="authEmail" class="authInput">
      <input type="password" placeholder="Password" id="authPassword" class="authInput">
      <button class="btn btnPrimary" id="signInBtn">Sign In</button>
      <button class="btn btnSecondary" id="createAccountBtn">Create Account</button>
      <div style="text-align:center;margin-top:4px;">
        <span class="smallText" id="authMessage" style="color:var(--accent);"></span>
      </div>
    </div>

    <div class="welcomeFooter">
      <button class="btn btnSecondary" id="continueOfflineBtn" style="margin-top:12px;">
        Continue Offline
      </button>
    </div>
  </div>
</div>



<script src="js/config.js"></script>
<script src="js/constants.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/offline.js"></script>
<script src="js/sync.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    Logit.Auth.initWelcomePage();
  });
</script>
</body>
</html>
